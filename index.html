<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PediAbx — 소아청소년과 항생제 참고자료</title>
<style>
:root {
  --sidebar-w: 240px;
  --blue: #1a6b5a;
  --blue-dark: #134d41;
  --blue-light: #e8f5f1;
  --blue-mid: #2d8c74;
  --teal: #17a589;
  --teal-light: #d5f0eb;
  --red: #e74c3c;
  --orange: #e67e22;
  --yellow: #f1c40f;
  --green: #27ae60;
  --gray-50: #f8fafb;
  --gray-100: #f0f2f4;
  --gray-200: #e2e6ea;
  --gray-400: #9aa5b1;
  --gray-600: #4a5568;
  --gray-800: #1a202c;
  --white: #ffffff;
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
  --shadow: 0 2px 12px rgba(0,0,0,0.10);
  --radius: 10px;
  --radius-sm: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background: var(--gray-100);
  color: var(--gray-800);
  font-size: 13px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── TOP BAR ── */
.topbar {
  height: 48px;
  background: var(--blue-dark);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  z-index: 50;
}
.topbar-logo { font-size: 17px; font-weight: 800; color: white; letter-spacing: -0.5px; }
.topbar-sub { font-size: 11px; color: rgba(255,255,255,0.6); }
.topbar-badges { margin-left: auto; display: flex; gap: 8px; }
.topbar-badge {
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.25); border-radius: 20px;
  padding: 2px 10px;
}

/* ── MAIN LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── LEFT SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--white);
  border-right: 1px solid var(--gray-200);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}

/* Search */
.search-wrap {
  padding: 12px;
  border-bottom: 1px solid var(--gray-200);
  flex-shrink: 0;
}
.search-box {
  position: relative;
}
.search-box input {
  width: 100%;
  padding: 8px 10px 8px 32px;
  border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm);
  font-size: 12px;
  outline: none;
  color: var(--gray-800);
  background: var(--gray-50);
  transition: border-color 0.2s;
}
.search-box input:focus { border-color: var(--teal); background: white; }
.search-box input::placeholder { color: var(--gray-400); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--gray-400); }
.autocomplete {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: white; border-radius: var(--radius-sm);
  box-shadow: var(--shadow); z-index: 200; overflow: hidden; display: none;
}
.autocomplete.open { display: block; }
.ac-item {
  padding: 8px 12px; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--gray-100);
}
.ac-item:last-child { border-bottom: none; }
.ac-item:hover { background: var(--teal-light); }
.ac-item .ac-sub { font-size: 10px; color: var(--gray-400); margin-left: auto; }

/* Sidebar sections */
.sidebar-body { flex: 1; overflow-y: auto; }
.sidebar-section { padding: 8px 0; border-bottom: 1px solid var(--gray-100); }
.sidebar-section-title {
  font-size: 10px; font-weight: 800; color: var(--gray-400);
  letter-spacing: 0.8px; text-transform: uppercase;
  padding: 4px 12px 6px;
}

/* Disease tags */
.disease-tags { display: flex; flex-wrap: wrap; gap: 5px; padding: 0 12px 8px; }
.dtag {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 20px; cursor: pointer;
  border: 1.5px solid var(--gray-200);
  background: var(--gray-50); color: var(--gray-600);
  transition: all 0.15s;
  white-space: nowrap;
}
.dtag:hover, .dtag.active { background: var(--teal); color: white; border-color: var(--teal); }

/* Drug list */
.drug-list-item {
  display: flex; align-items: center; gap: 9px;
  padding: 8px 12px; cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
}
.drug-list-item:hover { background: var(--gray-50); }
.drug-list-item.active { background: var(--teal-light); border-left-color: var(--teal); }
.drug-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.drug-list-info { flex: 1; min-width: 0; }
.drug-list-name { font-size: 12px; font-weight: 700; color: var(--gray-800); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.drug-list-sub { font-size: 10px; color: var(--gray-400); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.renal-badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px;
  border-radius: 4px; background: #fff3cd; color: #856404;
  flex-shrink: 0; white-space: nowrap;
}
.tdm-badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px;
  border-radius: 4px; background: #f8d7da; color: #842029;
  flex-shrink: 0; white-space: nowrap;
}

/* ── RIGHT PANEL ── */
.main-panel {
  flex: 1;
  overflow-y: auto;
  padding: 16px 20px;
  background: var(--gray-100);
}

/* Welcome screen */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; gap: 12px; color: var(--gray-400);
}
.welcome-icon { font-size: 48px; }
.welcome-title { font-size: 18px; font-weight: 700; color: var(--gray-600); }
.welcome-sub { font-size: 13px; }

/* Drug header */
.drug-header {
  background: white; border-radius: var(--radius);
  padding: 16px 20px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  display: flex; align-items: flex-start; gap: 14px;
}
.drug-header-dot {
  width: 14px; height: 14px; border-radius: 50%;
  flex-shrink: 0; margin-top: 4px;
}
.drug-header-info { flex: 1; }
.drug-header-name { font-size: 20px; font-weight: 800; color: var(--gray-800); letter-spacing: -0.3px; }
.drug-header-sub { font-size: 12px; color: var(--gray-400); margin-top: 2px; }
.drug-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.drug-tag {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; border: 1.5px solid;
}
.tag-class { background: #e8f5f1; color: var(--blue); border-color: #b2dfdb; }
.tag-renal { background: #fff8e1; color: #f57f17; border-color: #ffecb3; }
.tag-tdm { background: #fce4ec; color: #c62828; border-color: #f48fb1; }
.tag-route { background: var(--gray-100); color: var(--gray-600); border-color: var(--gray-200); }

/* Alert banner */
.drug-alert {
  background: #fff8e1; border: 1px solid #ffe082;
  border-left: 4px solid var(--orange);
  border-radius: var(--radius-sm);
  padding: 10px 14px; margin-bottom: 12px;
  font-size: 12px; color: #5d4037;
}
.drug-alert.danger {
  background: #fce4ec; border-color: #ef9a9a; border-left-color: var(--red);
  color: #b71c1c;
}

/* Dose calculator */
.calc-card {
  background: white; border-radius: var(--radius);
  padding: 14px 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  border-left: 4px solid var(--teal);
}
.calc-title { font-size: 12px; font-weight: 800; color: var(--teal); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
.calc-input-row { display: flex; align-items: flex-end; gap: 10px; flex-wrap: wrap; }
.calc-input-group label { font-size: 10px; font-weight: 700; color: var(--gray-600); display: block; margin-bottom: 4px; }
.calc-input-group input {
  padding: 7px 10px; border: 1.5px solid var(--gray-200);
  border-radius: var(--radius-sm); font-size: 13px; width: 100px;
  outline: none; transition: border-color 0.2s;
}
.calc-input-group input:focus { border-color: var(--teal); }
.calc-btn {
  padding: 8px 16px; background: var(--teal); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 12px;
  font-weight: 700; cursor: pointer; transition: background 0.15s;
}
.calc-btn:hover { background: var(--blue-mid); }
.calc-results {
  display: none; margin-top: 12px;
}
.calc-results.show { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
.calc-result-box {
  background: var(--teal-light); border-radius: var(--radius-sm);
  padding: 10px 12px; border: 1px solid #b2dfdb;
}
.calc-result-label { font-size: 10px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
.calc-result-dose { font-size: 18px; font-weight: 800; color: var(--blue-dark); }
.calc-result-sub { font-size: 10px; color: var(--gray-600); margin-top: 2px; }
.calc-result-box.capped { border-color: #ffcc80; background: #fff8e1; }
.calc-result-box.capped .calc-result-dose { color: var(--orange); }
.calc-cap-note { font-size: 10px; color: var(--orange); margin-top: 6px; }

/* Content card */
.content-card {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); margin-bottom: 12px;
  overflow: hidden;
}
.content-card-title {
  padding: 12px 16px; font-size: 12px; font-weight: 800;
  color: var(--gray-800); border-bottom: 1px solid var(--gray-100);
  display: flex; align-items: center; gap: 6px;
  background: var(--gray-50);
}

/* Dose table */
.dose-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.dose-table th {
  background: var(--gray-50); font-size: 10px; font-weight: 800;
  color: var(--gray-600); text-transform: uppercase; letter-spacing: 0.5px;
  padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--gray-200);
  white-space: nowrap;
}
.dose-table td {
  padding: 9px 12px; border-bottom: 1px solid var(--gray-100);
  vertical-align: middle;
}
.dose-table tr:last-child td { border-bottom: none; }
.dose-table tr:hover td { background: var(--gray-50); }
.dose-table .dose-val { font-weight: 700; color: var(--blue-dark); font-size: 12px; }
.dose-table .freq-badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  background: var(--teal-light); color: var(--teal); font-weight: 700;
  font-size: 10px; white-space: nowrap;
}
.dose-table .route-badge {
  display: inline-block; padding: 2px 7px; border-radius: 20px;
  font-weight: 700; font-size: 10px; white-space: nowrap;
}
.route-iv { background: #e3f2fd; color: #1565c0; }
.route-po { background: #e8f5e9; color: #2e7d32; }
.route-im { background: #f3e5f5; color: #7b1fa2; }
.route-ip { background: #fff3e0; color: #e65100; }
.dose-table .max-dose { font-size: 11px; color: var(--gray-600); }
.dose-table .note-cell { font-size: 11px; color: var(--gray-600); font-style: italic; }

/* Mix card */
.mix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
.mix-item { padding: 12px 16px; border-right: 1px solid var(--gray-100); }
.mix-item:last-child { border-right: none; }
.mix-item:nth-child(2) ~ .mix-item { border-top: 1px solid var(--gray-100); }
.mix-label { font-size: 10px; font-weight: 800; color: var(--gray-400); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.mix-val { font-size: 12px; color: var(--gray-800); white-space: pre-wrap; line-height: 1.6; }

/* Renal table */
.renal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.renal-table th {
  background: #fff8e1; font-size: 10px; font-weight: 800;
  color: #5d4037; padding: 8px 12px; text-align: left;
  border-bottom: 1px solid #ffe082;
}
.renal-table td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); }
.renal-table tr:last-child td { border-bottom: none; }
.renal-table tr:hover td { background: #fffde7; }
.renal-note { padding: 12px 16px; font-size: 12px; color: var(--gray-600); line-height: 1.6; white-space: pre-wrap; border-bottom: 1px solid var(--gray-100); }

/* Side effects */
.se-list { padding: 4px 0; }
.se-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 16px; border-bottom: 1px solid var(--gray-100);
}
.se-row:last-child { border-bottom: none; }
.se-sev { font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; flex-shrink: 0; margin-top: 1px; white-space: nowrap; }
.se-severe { background: #fce4ec; color: #c62828; }
.se-moderate { background: #fff8e1; color: #f57f17; }
.se-mild { background: #e8f5e9; color: #2e7d32; }
.se-name { font-weight: 700; font-size: 12px; }
.se-action { font-size: 11px; color: var(--gray-600); margin-top: 2px; }

/* Warn box */
.warn-box {
  margin: 12px 16px; padding: 10px 12px;
  background: #fff8e1; border-radius: var(--radius-sm);
  border: 1px solid #ffe082; border-left: 4px solid var(--orange);
  font-size: 11px; color: #5d4037; white-space: pre-wrap; line-height: 1.6;
}

/* Disease panel (right) */
.disease-panel {
  background: white; border-radius: var(--radius);
  box-shadow: var(--shadow-sm); margin-bottom: 12px;
  overflow: hidden;
}
.disease-panel-header {
  padding: 12px 16px; background: var(--blue-dark); color: white;
  font-size: 14px; font-weight: 800; display: flex; align-items: center;
  justify-content: space-between;
}
.disease-close { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 18px; cursor: pointer; line-height: 1; }
.disease-close:hover { color: white; }
.disease-abx-list { padding: 8px 0; }
.disease-abx-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 9px 16px; cursor: pointer;
  border-bottom: 1px solid var(--gray-100);
  transition: background 0.15s;
}
.disease-abx-row:last-child { border-bottom: none; }
.disease-abx-row:hover { background: var(--teal-light); }
.disease-rank {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 800; flex-shrink: 0; margin-top: 1px;
}
.rank-1 { background: #ffd700; color: #7a5800; }
.rank-2 { background: #c0c0c0; color: #444; }
.rank-3 { background: #cd7f32; color: white; }
.rank-alt { background: var(--gray-200); color: var(--gray-600); }
.disease-abx-name { font-weight: 700; font-size: 12px; color: var(--blue-dark); }
.disease-abx-note { font-size: 11px; color: var(--gray-600); margin-top: 2px; line-height: 1.4; }
.disease-footer { padding: 10px 16px; background: var(--gray-50); font-size: 11px; color: var(--gray-600); border-top: 1px solid var(--gray-100); line-height: 1.5; }

/* Reference */
.ref-section { font-size: 10px; color: var(--gray-400); padding: 12px 16px; line-height: 1.8; }
.ref-section strong { color: var(--gray-600); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }

/* Drug group header in sidebar */
.drug-group-header {
  font-size: 10px; font-weight: 800; color: var(--gray-400);
  letter-spacing: 0.6px; text-transform: uppercase;
  padding: 8px 12px 4px;
}

/* IV / PO Tab bar */
.drug-tab-bar {
  display: flex;
  border-bottom: 2px solid var(--gray-200);
  background: var(--gray-50);
}
.drug-tab {
  flex: 1; padding: 9px 4px; border: none; background: none;
  font-size: 11px; font-weight: 700; color: var(--gray-400);
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.15s;
}
.drug-tab:hover { color: var(--teal); background: var(--teal-light); }
.drug-tab.active { color: var(--teal); border-bottom-color: var(--teal); background: white; }

/* Dot colors per class */
.dot-ceph { background: #3498db; }
.dot-pen { background: #2ecc71; }
.dot-carb { background: #e74c3c; }
.dot-glyco { background: #9b59b6; }
.dot-amino { background: #f39c12; }
.dot-macro { background: #1abc9c; }
.dot-other { background: #95a5a6; }
.dot-antifungal { background: #e91e63; }
.dot-antiviral { background: #00bcd4; }
.dot-steroid { background: #ff9800; }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo">PediAbx</div>
  <div class="topbar-sub">소아청소년과 항생제 참고자료</div>
  <div class="topbar-badges">
    <span class="topbar-badge">SNUBH 소아 항생제 가이드북 기반</span>
    <span class="topbar-badge">Ver 2.0 · 2025</span>
  </div>
</div>

<div class="layout">
  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="search-wrap">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="항생제 검색 (한글/영문)..." autocomplete="off">
        <div class="autocomplete" id="autocomplete"></div>
      </div>
    </div>
    <div class="sidebar-body" id="sidebarBody">
      <!-- Dynamically filled -->
    </div>
  </div>

  <!-- RIGHT MAIN PANEL -->
  <div class="main-panel" id="mainPanel">
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">💊</div>
      <div class="welcome-title">소아청소년과 항생제 가이드</div>
      <div class="welcome-sub">왼쪽에서 질환 또는 항생제를 선택하세요</div>
    </div>
  </div>
</div>

<script>

const DRUGS = [
  {
    id: "cefazolin",

      { crCl: "> 50", dose: "정상용량 q8h" },

      { crCl: "< 10", dose: "정상용량 q24h (또는 25mg/kg q24h)" }
    ],
    sideEffects: [
      { sev: "mild", name: "소화기 증상", action: "식사와 함께 복용 권장 (IV는 해당없음)" },

      { sev: "moderate", name: "과민반응 (발진, 두드러기)", action: "투여 중단, 항히스타민 투여 고려" },

    warnings: "Penicillin 알레르기 환자: 교차반응 가능 (특히 anaphylaxis 병력 시 주의)\nCephalosporin계 과민반응 병력 시 투여 금기",
    references: "[1][3]",
    tdm: false
  },
  {
    id: "piperacillin",
    name: "Piperacillin",
    altname: "피페라실린",
    class: "항슈도모나스 Penicillin",
    route: "IV",
    indications: [
      { label: "일반 감염", dosePerKg: 50, freq: "q6h", maxDose: 4000, note: "300 mg/kg/day #6" },
      { label: "중증 감염 / Pseudomonas", dosePerKg: 75, freq: "q6h", maxDose: 4000, note: "300 mg/kg/day #6 (max 24g/day)" }

// ── DOT COLOR MAP ──
function getDotClass(cls) {
  if (cls.includes('Cephalosporin')) return 'dot-ceph';
  if (cls.includes('Penicillin')) return 'dot-pen';
  if (cls.includes('Carbapenem')) return 'dot-carb';
  if (cls.includes('Glycopeptide')) return 'dot-glyco';
  if (cls.includes('Aminoglycoside')) return 'dot-amino';
  if (cls.includes('Macrolide') || cls.includes('Tetracycline')) return 'dot-macro';
  if (cls.includes('항진균') || cls.toLowerCase().includes('azole') || cls.includes('폴리엔')) return 'dot-antifungal';
  if (cls.includes('항바이러스') && !cls.includes('스테로이드')) return 'dot-antiviral';
  if (cls.includes('스테로이드')) return 'dot-steroid';
  return 'dot-other';
}

const isIV  = d => /IV|IM|IP/.test(d.route);
const isPO  = d => /PO/.test(d.route);

// IV groups (shown in IV tab)
const CLASS_ORDER_IV = [
  { label: 'Penicillin계',         test: d => isIV(d) && d.class.includes('Penicillin') },
  { label: 'Cephalosporin계',      test: d => isIV(d) && d.class.includes('Cephalosporin') },
  { label: 'Carbapenem계',         test: d => isIV(d) && d.class.includes('Carbapenem') },
  { label: 'Glycopeptide계',       test: d => isIV(d) && d.class.includes('Glycopeptide') },
  { label: 'Aminoglycoside계',     test: d => isIV(d) && d.class.includes('Aminoglycoside') },
  { label: '기타 항균제 (IV)',      test: d => isIV(d) && !d.class.includes('Penicillin') && !d.class.includes('Cephalosporin') &&
      !d.class.includes('Carbapenem') && !d.class.includes('Glycopeptide') && !d.class.includes('Aminoglycoside') &&
      !d.class.includes('항진균') && !d.class.toLowerCase().includes('azole') && !d.class.includes('폴리엔') &&
      !d.class.includes('항바이러스') && !d.class.includes('스테로이드') && !d.class.includes('Macrolide') && !d.class.includes('Tetracycline') },
  { label: '항진균제 (IV)',         test: d => isIV(d) && (d.class.includes('항진균') || d.class.toLowerCase().includes('azole') || d.class.includes('폴리엔')) },
  { label: '항바이러스제 / 기타',   test: d => isIV(d) && (d.class.includes('항바이러스') || d.class.includes('스테로이드')) },

// ── STATE ──
let currentDrug = null;
let currentDisease = null;

// ── BUILD SIDEBAR ──
let activeTab = 'iv'; // 'iv' | 'po'

function buildSidebar() {
  const body = document.getElementById('sidebarBody');
  let html = '';

  // Disease tags section
  html += `<div class="sidebar-section">
    <div class="sidebar-section-title">질환별 검색</div>
    <div class="disease-tags">`;
  DISEASE_TAGS.forEach(t => {
    if (t.idx >= 0) html += `<button class="dtag" data-idx="${t.idx}" onclick="showDisease(${t.idx})">${t.label}</button>`;
  });
  html += `</div></div>`;

  // Tab switcher
  html += `<div class="sidebar-section" style="padding:0;border-bottom:none">
    <div class="drug-tab-bar">
      <button class="drug-tab${activeTab === 'iv' ? ' active' : ''}" onclick="switchTab('iv')">💉 주사제 (IV)</button>
      <button class="drug-tab${activeTab === 'po' ? ' active' : ''}" onclick="switchTab('po')">💊 경구제 (PO)</button>
    </div>
  </div>`;

  // Drug list
  const orders = activeTab === 'iv' ? CLASS_ORDER_IV : CLASS_ORDER_PO;
  html += `<div class="sidebar-section" style="border-bottom:none">`;
  orders.forEach(group => {
    const drugs = DRUGS.filter(group.test);
    if (!drugs.length) return;
    html += `<div class="drug-group-header">${group.label}</div>`;
    drugs.forEach(d => {
      const dot = getDotClass(d.class);
      const badges = (d.tdm ? `<span class="tdm-badge">TDM</span>` : '') +
                     (d.renalTable && d.renalTable.length > 0 ? `<span class="renal-badge">Renal</span>` : '');
      html += `<div class="drug-list-item" id="drug-item-${d.id}" onclick="showDrug('${d.id}')">
        <div class="drug-dot ${dot}"></div>
        <div class="drug-list-info">
          <div class="drug-list-name">${d.name}</div>
          <div class="drug-list-sub">${d.class.split('(')[0].replace('·','').trim().split('·')[0].trim()}</div>
        </div>
        ${badges}
      </div>`;
    });
  });
  html += `</div>`;

  body.innerHTML = html;

  // Re-highlight active drug if any
  if (currentDrug) {
    const el = document.getElementById('drug-item-' + currentDrug.id);
    if (el) el.classList.add('active');
  }
}

function switchTab(tab) {
  activeTab = tab;
  buildSidebar();
}

// ── SEARCH ──
function initSearch() {
  const input = document.getElementById('searchInput');
  const ac = document.getElementById('autocomplete');

  input.addEventListener('input', () => {
    const q = input.value.trim().toLowerCase();
    if (!q) { ac.classList.remove('open'); return; }
    const hits = DRUGS.filter(d =>
      d.name.toLowerCase().includes(q) ||
      d.altname.toLowerCase().includes(q) ||
      d.class.toLowerCase().includes(q)
    ).slice(0, 8);
    if (!hits.length) { ac.classList.remove('open'); return; }
    ac.innerHTML = hits.map(d => `
      <div class="ac-item" onclick="pickDrug('${d.id}', this.closest('.autocomplete').previousElementSibling)">
        <div class="drug-dot ${getDotClass(d.class)}" style="width:8px;height:8px;border-radius:50%;flex-shrink:0"></div>
        <span style="font-weight:700">${d.name}</span>
        <span class="ac-sub">${d.altname}</span>
      </div>`).join('');
    ac.classList.add('open');
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.search-box')) ac.classList.remove('open');
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = input.value.trim().toLowerCase();
      const hit = DRUGS.find(d => d.name.toLowerCase().includes(q) || d.altname.toLowerCase().includes(q));
      if (hit) pickDrug(hit.id, input);
    }
  });
}

function pickDrug(id, inputEl) {
  document.getElementById('autocomplete').classList.remove('open');
  if (inputEl) inputEl.value = '';
  showDrug(id);
}

// ── ROUTE BADGE HTML ──
function routeBadge(route) {
  return route.split('/').map(r => {
    const r2 = r.trim().toUpperCase();
    const cls = r2 === 'IV' ? 'route-iv' : r2 === 'PO' ? 'route-po' : r2 === 'IM' ? 'route-im' : r2 === 'IP' ? 'route-ip' : 'route-po';
    return `<span class="route-badge ${cls}">${r2}</span>`;
  }).join(' ');
}

// ── SHOW DRUG ──
function showDrug(id) {
  const drug = DRUGS.find(d => d.id === id);
  if (!drug) return;
  currentDrug = drug;
  currentDisease = null;

  // Auto-switch tab: if drug is PO-only, switch to PO tab; if IV, switch to IV tab
  const isPoOnly = /^PO$/.test(drug.route.trim());
  const isIvOnly = /^IV$/.test(drug.route.trim()) || /^IV\/IM$/.test(drug.route.trim());
  if (isPoOnly && activeTab !== 'po') { activeTab = 'po'; buildSidebar(); }
  else if (isIvOnly && activeTab !== 'iv') { activeTab = 'iv'; buildSidebar(); }

  // Sidebar highlight
  document.querySelectorAll('.drug-list-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dtag').forEach(el => el.classList.remove('active'));
  const item = document.getElementById('drug-item-' + id);
  if (item) { item.classList.add('active'); item.scrollIntoView({ block: 'nearest' }); }

  // Has renal dosing?
  const hasRenal = drug.renalTable && drug.renalTable.length > 0;

  // Tags
  const tags = [
    `<span class="drug-tag tag-class">${drug.class}</span>`,
    `<span class="drug-tag tag-route">${drug.route}</span>`,
    hasRenal ? `<span class="drug-tag tag-renal">Renal 조정 필요</span>` : '',
    drug.tdm ? `<span class="drug-tag tag-tdm">TDM 약물</span>` : '',
  ].join('');

  // Warning banner (if drug has critical warnings)
  const hasDanger = drug.warnings && (drug.warnings.includes('금기') || drug.warnings.includes('절대'));
  const warnBanner = drug.warnings ? `
    <div class="drug-alert${hasDanger ? ' danger' : ''}">
      ${drug.tdm ? '★ TDM 약물 — ' : ''}${drug.warnings.split('\n')[0]}
    </div>` : '';

  // Dose table rows
  const doseRows = drug.indications.map(ind => `
    <tr>
      <td>${ind.label}</td>
      <td class="dose-val">${ind.dosePerKg > 0 ? ind.dosePerKg + ' mg/kg/dose' : '—'}</td>
      <td><span class="freq-badge">${ind.freq}</span></td>
      <td>${routeBadge(drug.route)}</td>
      <td class="max-dose">${ind.maxDose >= 1000 ? (ind.maxDose/1000).toFixed(1)+'g' : ind.maxDose+'mg'}/dose</td>
      <td class="note-cell">${ind.note}</td>
    </tr>`).join('');

  // Mix grid
  const mixContent = `
    <div class="mix-grid">
      <div class="mix-item">
        <div class="mix-label">💊 Mix 방법 / 희석</div>
        <div class="mix-val">${drug.mix}</div>
      </div>
      <div class="mix-item">
        <div class="mix-label">⏱ 투약 속도</div>
        <div class="mix-val">${drug.infusionRate}</div>
      </div>
    </div>
    ${drug.warnings ? `<div class="warn-box">${drug.warnings}</div>` : ''}`;

  // Renal content
  const renalContent = drug.renalNote ? `
    <div class="renal-note">${drug.renalNote}</div>
    ${hasRenal ? `
    <table class="renal-table">
      <thead><tr><th>CrCL (mL/min)</th><th>권장 용량 / 용법</th></tr></thead>
      <tbody>${drug.renalTable.map(r => `<tr><td><strong>${r.crCl}</strong></td><td>${r.dose}</td></tr>`).join('')}</tbody>
    </table>
    <div style="padding:8px 16px;font-size:10px;color:#888">※ 소아 eGFR: Schwartz 공식 = 0.413 × 신장(cm) / Scr (mg/dL)</div>` : ''}` : '<div class="renal-note">신기능에 따른 용량 조절 정보 없음</div>';

  // Side effects
  const seContent = drug.sideEffects.map(se => {
    const sevClass = se.sev === 'severe' ? 'se-severe' : se.sev === 'moderate' ? 'se-moderate' : 'se-mild';
    const sevLabel = se.sev === 'severe' ? '중증' : se.sev === 'moderate' ? '주의' : '경증';
    return `<div class="se-row">
      <span class="se-sev ${sevClass}">${sevLabel}</span>
      <div><div class="se-name">${se.name}</div><div class="se-action">→ ${se.action}</div></div>
    </div>`;
  }).join('');

  const html = `
    <div class="drug-header">
      <div class="drug-header-dot ${getDotClass(drug.class)}"></div>
      <div class="drug-header-info">
        <div class="drug-header-name">${drug.name}</div>
        <div class="drug-header-sub">${drug.altname}</div>
        <div class="drug-tags">${tags}</div>
      </div>
    </div>
    ${warnBanner}

    <div class="calc-card">
      <div class="calc-title">⚖️ 체중 기반 용량 계산기</div>
      <div class="calc-input-row">
        <div class="calc-input-group">
          <label>체중 (kg)</label>
          <input type="number" id="calcWeight" placeholder="예) 15" min="0.5" max="150" step="0.1"
            oninput="calcDose()">
        </div>
        <div style="font-size:11px;color:#888;align-self:center;margin-top:14px">입력 시 자동 계산</div>
      </div>
      <div class="calc-results" id="calcResults"></div>
    </div>

    <div class="content-card">
      <div class="content-card-title">💊 용량 및 투약 용법</div>
      <table class="dose-table">
        <thead><tr>
          <th>적응증/연령군</th><th>용량</th><th>투약 간격</th>
          <th>경로</th><th>최대 용량</th><th>비고</th>
        </tr></thead>
        <tbody>${doseRows}</tbody>
      </table>
    </div>

    <div class="content-card">
      <div class="content-card-title">🧪 믹스 방법 / 투약 정보</div>
      ${mixContent}
    </div>

    <div class="content-card">
      <div class="content-card-title">🫘 신기능 저하 시 용량 조절</div>
      ${renalContent}
    </div>

    <div class="content-card">
      <div class="content-card-title">⚠️ 부작용 및 조치</div>
      <div class="se-list">${seContent}</div>
    </div>

    <div class="ref-section">
      <strong>Reference:</strong> ${drug.references}
    </div>`;

  const panel = document.getElementById('mainPanel');
  panel.innerHTML = html;
  panel.scrollTop = 0;
}

// ── DOSE CALCULATOR (auto on input) ──
function calcDose() {
  const wt = parseFloat(document.getElementById('calcWeight')?.value);
  const resultsEl = document.getElementById('calcResults');
  if (!currentDrug || !resultsEl) return;
  if (!wt || wt <= 0) { resultsEl.classList.remove('show'); resultsEl.innerHTML = ''; return; }

  const drug = currentDrug;
  const fmt = v => v >= 1000 ? (v/1000).toFixed(2).replace(/\.?0+$/, '')+'g' : Math.round(v*10)/10+'mg';

  const boxes = drug.indications
    .filter(ind => ind.dosePerKg > 0)
    .map(ind => {
      const raw = wt * ind.dosePerKg;
      const actual = Math.min(raw, ind.maxDose);
      const capped = raw > ind.maxDose;
      return `<div class="calc-result-box${capped ? ' capped' : ''}">
        <div class="calc-result-label">${ind.label}</div>
        <div class="calc-result-dose">${fmt(actual)}</div>
        <div class="calc-result-sub">${ind.freq} · ${drug.route}${capped ? ' · Max 적용' : ''}</div>
        ${capped ? `<div class="calc-cap-note">계산값 ${fmt(raw)} → Max dose 적용</div>` : ''}
      </div>`;
    });

  if (!boxes.length) { resultsEl.classList.remove('show'); return; }
  resultsEl.innerHTML = boxes.join('');
  resultsEl.classList.add('show');
}

// ── SHOW DISEASE ──
function showDisease(idx) {
  if (idx < 0 || idx >= DISEASES.length) return;
  const dis = DISEASES[idx];
  currentDisease = idx;
  currentDrug = null;

  document.querySelectorAll('.drug-list-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dtag').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`.dtag[data-idx="${idx}"]`).forEach(el => el.classList.add('active'));

  const rows = dis.drugs.map(d => {
    const rankClass = d.rank === 1 ? 'rank-1' : d.rank === 2 ? 'rank-2' : d.rank === 3 ? 'rank-3' : 'rank-alt';
    const rankText = d.rank === 1 ? '1' : d.rank === 2 ? '2' : d.rank === 3 ? '3' : 'Alt';
    const drugId = DRUGS.find(dr =>
      dr.name.toLowerCase().includes(d.name.split(/[\s(+/]/)[0].toLowerCase()) ||
      (d.name.includes('Tazocin') && dr.id === 'tazocin') ||
      (d.name.includes('Ampicillin/Sulbactam') && dr.id === 'ampicillin_sulbactam') ||
      (d.name.toLowerCase().includes('ampicillin') && !d.name.includes('/') && dr.id === 'ampicillin')
    )?.id;
    const clickable = drugId ? `onclick="showDrug('${drugId}')"` : '';
    return `<div class="disease-abx-row" ${clickable}>
      <div class="disease-rank ${rankClass}">${rankText}</div>
      <div>
        <div class="disease-abx-name">💊 ${d.name}</div>
        <div class="disease-abx-note">${d.note}</div>
      </div>
    </div>`;
  }).join('');

  const html = `
    <div class="disease-panel">
      <div class="disease-panel-header">
        <span>${dis.icon} ${dis.name}</span>
        <button class="disease-close" onclick="clearPanel()">✕</button>
      </div>
      <div class="disease-abx-list">${rows}</div>
      <div class="disease-footer">${dis.note}</div>
    </div>`;

  const panel = document.getElementById('mainPanel');
  panel.innerHTML = html;
  panel.scrollTop = 0;
}

function clearPanel() {
  currentDrug = null; currentDisease = null;
  document.querySelectorAll('.drug-list-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.dtag').forEach(el => el.classList.remove('active'));
  document.getElementById('mainPanel').innerHTML = `
    <div class="welcome" id="welcomeScreen">
      <div class="welcome-icon">💊</div>
      <div class="welcome-title">소아청소년과 항생제 가이드</div>
      <div class="welcome-sub">왼쪽에서 질환 또는 항생제를 선택하세요</div>
    </div>`;
}

// ── INIT ──
buildSidebar();
initSearch();
</script>
</body>
</html>
