<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>소아 항생제 참고 자료 | PediAbx SNUBH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
  --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-200:#5DCAA5;--teal-400:#1D9E75;--teal-600:#0F6E56;--teal-800:#085041;
  --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;
  --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-400:#BA7517;--amber-600:#854F0B;--amber-800:#633806;
  --red-50:#FCEBEB;--red-100:#F7C1C1;--red-400:#E24B4A;--red-600:#A32D2D;--red-800:#791F1F;
  --gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#444441;
  --purple-50:#EEEDFE;--purple-100:#CECBF6;--purple-400:#7F77DD;--purple-600:#534AB7;--purple-800:#3C3489;
  --green-50:#EAF3DE;--green-100:#C0DD97;--green-400:#639922;--green-600:#3B6D11;--green-800:#27500A;
  --coral-50:#FAECE7;--coral-100:#F5C4B3;--coral-400:#D85A30;--coral-600:#993C1D;--coral-800:#712B13;
  --pink-50:#FBEAF0;--pink-100:#F4C0D1;--pink-400:#D4537E;--pink-600:#993556;
  --bg:#F5F7F9;--card:#FFF;--border:rgba(0,0,0,0.09);
  --text:#1A1A1A;--text-muted:#5F5E5A;--text-hint:#888780;
  --r:10px;--rl:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;}

.site-header{background:var(--teal-600);padding:0 20px;display:flex;align-items:center;gap:12px;height:54px;position:sticky;top:0;z-index:200;}
.logo{color:#fff;font-size:17px;font-weight:700;}
.logo span{color:var(--teal-100);font-weight:400;font-size:12px;margin-left:8px;}
.header-spacer{flex:1;}
.hbadge{background:rgba(255,255,255,0.15);color:#fff;font-size:11px;padding:3px 10px;border-radius:20px;margin-left:6px;}

.app-layout{display:grid;grid-template-columns:268px 1fr;min-height:calc(100vh - 54px);}
.sidebar{background:var(--card);border-right:0.5px solid var(--border);overflow-y:auto;position:sticky;top:54px;height:calc(100vh - 54px);}
.main-area{padding:24px 28px;overflow-y:auto;}

.search-wrap{padding:12px 12px 8px;border-bottom:0.5px solid var(--border);position:relative;}
.search-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text-hint);font-size:13px;}
.search-input{width:100%;border:0.5px solid var(--border);border-radius:var(--r);padding:7px 10px 7px 32px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);}
.search-input:focus{outline:none;border-color:var(--teal-400);}

.cat-section{padding:8px 12px 4px;font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:0.5px;}

.ind-pills{padding:6px 12px 10px;border-bottom:0.5px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;}
.ind-pill{padding:4px 10px;border:0.5px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--card);transition:all 0.12s;font-family:inherit;color:var(--text);}
.ind-pill:hover,.ind-pill.active{background:var(--teal-50);border-color:var(--teal-400);color:var(--teal-600);}

.drug-item{display:flex;align-items:center;padding:7px 12px;cursor:pointer;border-left:3px solid transparent;transition:all 0.12s;gap:9px;}
.drug-item:hover{background:var(--teal-50);}
.drug-item.active{background:var(--teal-50);border-left-color:var(--teal-400);}
.drug-item .dn{font-size:13px;font-weight:500;}
.drug-item .dc{font-size:11px;color:var(--text-hint);}
.rbadge{margin-left:auto;font-size:9px;padding:2px 6px;border-radius:20px;background:var(--red-50);color:var(--red-600);white-space:nowrap;}
.nbadge{margin-left:auto;font-size:9px;padding:2px 6px;border-radius:20px;background:var(--green-50);color:var(--green-600);white-space:nowrap;}

/* MAIN */
.drug-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;}
.drug-icon{width:50px;height:50px;border-radius:var(--rl);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.drug-title h1{font-size:21px;font-weight:700;}
.drug-title .dmeta{font-size:13px;color:var(--text-muted);margin-top:2px;}
.tag-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}
.tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;}
.tag.beta{background:var(--blue-50);color:var(--blue-800);}
.tag.glyco{background:var(--purple-50);color:var(--purple-800);}
.tag.amino{background:var(--amber-50);color:var(--amber-800);}
.tag.carbap{background:var(--coral-50);color:var(--coral-800);}
.tag.macro{background:var(--green-50);color:var(--green-800);}
.tag.misc{background:var(--gray-50);color:var(--gray-800);}
.tag.rf{background:var(--red-50);color:var(--red-800);}
.tag.ok{background:var(--teal-50);color:var(--teal-800);}

/* CALC */
.calc-card{background:var(--teal-50);border:0.5px solid var(--teal-100);border-radius:var(--rl);padding:16px;margin-bottom:20px;}
.calc-card h3{font-size:13px;font-weight:600;color:var(--teal-600);margin-bottom:10px;}
.calc-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.wt-input{width:85px;padding:7px 10px;border:0.5px solid var(--teal-200);border-radius:var(--r);font-size:14px;font-family:inherit;background:#fff;}
.wt-input:focus{outline:none;border-color:var(--teal-400);}
.dose-results{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;}
.drc{background:#fff;border:0.5px solid var(--teal-100);border-radius:var(--r);padding:10px 12px;}
.drc .dlabel{font-size:10px;color:var(--text-hint);margin-bottom:2px;}
.drc .dval{font-size:17px;font-weight:600;color:var(--teal-600);font-family:'JetBrains Mono',monospace;}
.drc .dsub{font-size:11px;color:var(--text-muted);}

/* TABS */
.tab-row{display:flex;border-bottom:0.5px solid var(--border);margin-bottom:16px;gap:0;overflow-x:auto;}
.tab-btn{padding:8px 14px;font-size:13px;font-family:inherit;cursor:pointer;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-muted);transition:all 0.12s;white-space:nowrap;margin-bottom:-0.5px;}
.tab-btn:hover{color:var(--text);}
.tab-btn.active{color:var(--teal-600);border-bottom-color:var(--teal-400);font-weight:500;}
.tab-content{display:none;}
.tab-content.active{display:block;}

/* SECTION CARDS */
.sc{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:18px;margin-bottom:14px;}
.sc h3{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.sc.warn{border-left:3px solid var(--amber-400);}
.sc.danger{border-left:3px solid var(--red-400);}
.sc.info{border-left:3px solid var(--blue-400);}
.sc.ok{border-left:3px solid var(--teal-400);}

/* TABLES */
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{background:var(--gray-50);padding:7px 10px;text-align:left;font-weight:600;font-size:11px;color:var(--text-muted);border-bottom:0.5px solid var(--border);}
.dt td{padding:8px 10px;border-bottom:0.5px solid var(--gray-50);vertical-align:top;}
.dt tr:last-child td{border-bottom:none;}
.dt tr:hover td{background:var(--teal-50);}
.mono{font-family:'JetBrains Mono',monospace;font-size:11px;}

/* MIX */
.mix-grid{display:grid;gap:8px;}
.mix-row{display:grid;grid-template-columns:1fr 1.2fr 1fr 1.5fr;gap:10px;align-items:start;padding:9px 12px;background:var(--bg);border-radius:var(--r);font-size:12px;}
.mix-row.hd{font-weight:600;font-size:11px;color:var(--text-hint);background:none;padding-bottom:2px;}

/* RENAL */
.rg{display:grid;gap:7px;}
.rrow{display:grid;grid-template-columns:110px 110px 1fr;gap:10px;align-items:start;padding:8px 10px;border-radius:var(--r);font-size:12px;}
.rrow.hd{font-weight:600;font-size:11px;color:var(--text-hint);padding-bottom:0;}
.rrow:not(.hd){background:var(--bg);}
.gfr-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-align:center;display:inline-block;}
.gfr-n{background:var(--green-50);color:var(--green-600);}
.gfr-m{background:var(--amber-50);color:var(--amber-600);}
.gfr-s{background:var(--coral-50);color:var(--coral-600);}
.gfr-c{background:var(--red-50);color:var(--red-600);}

/* ADR */
.adr-list{display:grid;gap:7px;}
.adr-item{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;border-radius:var(--r);background:var(--bg);}
.adr-sev{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:1px;}
.sev-c{background:var(--gray-50);color:var(--gray-600);}
.sev-m{background:var(--amber-50);color:var(--amber-600);}
.sev-s{background:var(--red-50);color:var(--red-600);}
.adr-name{font-weight:500;font-size:12px;}
.adr-action{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* INDICATION VIEW */
.ind-drug-card{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border:0.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all 0.12s;margin-bottom:7px;}
.ind-drug-card:hover{border-color:var(--teal-400);background:var(--teal-50);}
.idc-icon{width:34px;height:34px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.idc-name{font-weight:600;font-size:13px;}
.idc-detail{font-size:11px;color:var(--text-muted);}

/* NOTE BOXES */
.nbox{background:var(--blue-50);border-left:3px solid var(--blue-400);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--blue-800);}
.wbox{background:var(--amber-50);border-left:3px solid var(--amber-400);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--amber-800);}
.rbox{background:var(--red-50);border-left:3px solid var(--red-400);border-radius:0 var(--r) var(--r) 0;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--red-800);}

.badge-first{background:var(--teal-50);color:var(--teal-800);font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;margin-left:6px;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-hint);}
.empty-state i{font-size:44px;margin-bottom:12px;display:block;}

.hidden{display:none!important;}
.divider{height:0.5px;background:var(--border);margin:6px 0;}

/* Protocol boxes */
.proto-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.proto-card{background:var(--card);border:0.5px solid var(--border);border-radius:var(--rl);padding:14px;}
.proto-card.low{border-top:3px solid var(--teal-400);}
.proto-card.high{border-top:3px solid var(--red-400);}
.proto-card h4{font-size:13px;font-weight:600;margin-bottom:8px;}
.proto-card ul{font-size:12px;padding-left:16px;color:var(--text-muted);}
.proto-card ul li{margin-bottom:3px;}

@media(max-width:768px){.app-layout{grid-template-columns:1fr;}.sidebar{position:static;height:auto;}.main-area{padding:14px;}.proto-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">PediAbx <span>소아청소년과 항생제 참고자료</span></div>
  <div class="header-spacer"></div>
  <span class="hbadge">SNUBH 소아 항생제 가이드북 기반</span>
  <span class="hbadge">Ver 2.0 · 2025</span>
</header>

<div class="app-layout">
<aside class="sidebar">
  <div class="search-wrap">
    <i class="fa-solid fa-magnifying-glass search-icon"></i>
    <input class="search-input" id="drugSearch" type="text" placeholder="항생제 검색 (한글/영문)..." oninput="filterDrugs(this.value)">
  </div>
  <div class="cat-section">질환별 검색</div>
  <div class="ind-pills">
    <button class="ind-pill" onclick="showInd('uti',this)">UTI</button>
    <button class="ind-pill" onclick="showInd('sepsis',this)">Neonatal Sepsis</button>
    <button class="ind-pill" onclick="showInd('pneumonia',this)">폐렴</button>
    <button class="ind-pill" onclick="showInd('mycoplasma',this)">Mycoplasma</button>
    <button class="ind-pill" onclick="showInd('meningitis',this)">수막염</button>
    <button class="ind-pill" onclick="showInd('ssti',this)">SSTI</button>
    <button class="ind-pill" onclick="showInd('intraabdominal',this)">복강내 감염</button>
    <button class="ind-pill" onclick="showInd('covid',this)">COVID-19</button>
    <button class="ind-pill" onclick="showInd('febrile_neutropenia',this)">발열성 호중구 감소증</button>
    <button class="ind-pill" onclick="showInd('antifungal',this)">항진균제</button>
  </div>
  <div class="cat-section" style="margin-top:4px;">항생제 (IV)</div>
  <div id="ivDrugList"></div>
  <div class="divider"></div>
  <div class="cat-section">항생제 (경구)</div>
  <div id="poDrugList"></div>
  <div class="divider"></div>
  <div class="cat-section">항바이러스제</div>
  <div id="avDrugList"></div>
  <div class="divider"></div>
  <div class="cat-section">항진균제</div>
  <div id="afDrugList"></div>
</aside>

<main class="main-area" id="mainContent">
  <div class="empty-state" id="welcomeScreen">
    <i class="fa-solid fa-pills"></i>
    <p style="font-size:18px;font-weight:600;color:var(--text);">소아 항생제 참고 자료</p>
    <p style="margin-top:8px;font-size:13px;">좌측에서 항생제를 선택하거나 질환별로 검색하세요.<br>분당서울대병원 소아 항생제 가이드북 기반</p>
  </div>
  <div id="indicationView" class="hidden"></div>
  <div id="drugDetailView" class="hidden"></div>
</main>
</div>

<script>
const DRUGS = [
// ===================== IV ANTIBIOTICS =====================

let currentDrug=null, currentWeight='';

function init(){
  const iv=DRUGS.filter(d=>d.cat==='IV');
  const po=DRUGS.filter(d=>d.cat==='PO');
  const av=DRUGS.filter(d=>d.cat==='AV');
  const af=DRUGS.filter(d=>d.cat==='AF');
  renderList('ivDrugList',iv);
  renderList('poDrugList',po);
  renderList('avDrugList',av);
  renderList('afDrugList',af);
}

function renderList(containerId, drugs){
  const el=document.getElementById(containerId);
  el.innerHTML='';
  drugs.forEach(d=>{
    const div=document.createElement('div');
    div.className='drug-item'+(currentDrug?.id===d.id?' active':'');
    div.innerHTML=`<span style="font-size:15px">${d.icon}</span>
      <div><div class="dn">${d.name}</div><div class="dc">${d.class}</div></div>
      ${d.renal?'<span class="rbadge">Renal</span>':'<span class="nbadge">Renal-OK</span>'}`;
    div.onclick=()=>selectDrug(d.id);
    el.appendChild(div);
  });
}

function filterDrugs(q){
  const lq=q.toLowerCase();
  const filtered=DRUGS.filter(d=>d.name.toLowerCase().includes(lq)||d.kor.includes(q)||d.class.toLowerCase().includes(lq));
  document.getElementById('ivDrugList').innerHTML='';
  document.getElementById('poDrugList').innerHTML='';
  document.getElementById('avDrugList').innerHTML='';
  document.getElementById('afDrugList').innerHTML='';
  filtered.forEach(d=>{
    const elId=d.cat==='IV'?'ivDrugList':d.cat==='PO'?'poDrugList':d.cat==='AV'?'avDrugList':'afDrugList';
    const el=document.getElementById(elId);
    const div=document.createElement('div');
    div.className='drug-item'+(currentDrug?.id===d.id?' active':'');
    div.innerHTML=`<span style="font-size:15px">${d.icon}</span>
      <div><div class="dn">${d.name}</div><div class="dc">${d.class}</div></div>
      ${d.renal?'<span class="rbadge">Renal</span>':'<span class="nbadge">Renal-OK</span>'}`;
    div.onclick=()=>selectDrug(d.id);
    el.appendChild(div);
  });
}

function selectDrug(id){
  currentDrug=DRUGS.find(d=>d.id===id);
  document.querySelectorAll('.drug-item').forEach(el=>{
    el.classList.toggle('active', el.querySelector('.dn')?.textContent===currentDrug?.name);
  });
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('indicationView').classList.add('hidden');
  document.getElementById('drugDetailView').classList.remove('hidden');
  renderDrug(currentDrug);
}

function showInd(key, btn){
  document.querySelectorAll('.ind-pill').forEach(b=>b.classList.remove('active'));

function renderDrug(drug){

  const sevCls=s=>s==='common'?'sev-c':s==='monitor'?'sev-m':'sev-s';
  const sevLabel=s=>s==='common'?'흔함':s==='monitor'?'모니터링':'심각';
  const routeCls=r=>r==='IV'?'beta':r==='PO'?'macro':'amino';

  const doseRows=drug.doses.map(d=>`<tr>
    <td>${d.ind}</td>
    <td class="mono">${d.dose}</td>
    <td class="mono">${d.interval}</td>
    <td><span class="tag ${routeCls(d.route)}" style="font-size:10px;">${d.route}</span></td>
    <td class="mono">${d.max||'-'}</td>
    <td style="font-size:11px;color:var(--text-muted);">${d.note}</td>
  </tr>`).join('');

  const mixRows=drug.mix.map(m=>`<div class="mix-row">
    <div>${m.sol}</div><div class="mono">${m.conc}</div>
    <div class="mono">${m.rate}</div>
    <div style="font-size:11px;color:var(--text-muted);">${m.note}</div>
  </div>`).join('');

  const renalRows=drug.renal.map(r=>{
    let gc='gfr-n';
    const g=r.gfr.toLowerCase();
    if(g.includes('crrt')||g.includes('hd')||g.includes('<5')||g.includes('<10')||g.includes('<15')||g.includes('모든')||g.includes('말기'))gc=g.includes('모든')?'gfr-n':'gfr-c';
    else if(g.includes('<20')||g.includes('<25')||g.includes('<30'))gc='gfr-s';
    else if(g.includes('20-')||g.includes('10-')||g.includes('15-')||g.includes('25-'))gc='gfr-m';
    else if(g.includes('26-')||g.includes('30-')||g.includes('40-'))gc='gfr-m';
    return`<div class="rrow">
      <span class="gfr-badge ${gc}">${r.gfr}</span>
      <span style="font-size:11px;font-weight:500;">${r.label}</span>
      <span style="font-size:12px;">${r.dose}${r.note?` <span style="color:var(--text-hint);font-size:10px;">— ${r.note}</span>`:''}` +`</span></div>`;
  }).join('');

  const adrRows=drug.adrs.map(a=>`<div class="adr-item">
    <span class="adr-sev ${sevCls(a.sev)}">${sevLabel(a.sev)}</span>
    <div><div class="adr-name">${a.name}</div>
    <div class="adr-action"><i class="fa-solid fa-arrow-right" style="font-size:9px;color:var(--teal-400);margin-right:3px;"></i>${a.action}</div></div>
  </div>`).join('');

  const noRenal=drug.renal.length===1&&(drug.renal[0].gfr.includes('모든')||drug.renal[0].gfr.includes('금기'));

  view.innerHTML=`
  <div class="calc-card" style="margin-bottom:16px;">
    <h3><i class="fa-solid fa-calculator" style="margin-right:5px;"></i>체중 기반 용량 계산기</h3>
    <div class="calc-row">
      <input class="wt-input" type="number" id="weightInput" placeholder="체중 (kg)" min="0.5" max="150" step="0.1" oninput="calcDose()" value="${currentWeight}">
      <span style="font-size:12px;color:var(--text-muted);">kg 입력 시 자동 계산</span>
    </div>
    <div class="dose-results" id="doseResults"></div>
  </div>

  <div class="drug-header">
    <div class="drug-icon" style="background:${drug.ibg}">${drug.icon}</div>
    <div class="drug-title">
      <h1>${drug.name}</h1>
      <div class="dmeta">${drug.kor} · ${drug.class} · ${drug.cat==='IV'?'주사제':drug.cat==='PO'?'경구':drug.cat==='AV'?'항바이러스':'항진균제'}</div>
      <div class="tag-row">
        <span class="tag ${drug.ctag}">${drug.class}</span>
        ${drug.renal?'<span class="tag rf"><i class="fa-solid fa-kidneys" style="margin-right:2px;"></i> Renal 조정 필요</span>':'<span class="tag ok">Renal 조정 불필요</span>'}
      </div>
    </div>
  </div>
  ${drug.note?`<div class="wbox" style="margin-bottom:16px;"><i class="fa-solid fa-circle-exclamation" style="margin-right:5px;"></i>${drug.note}</div>`:''}

  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('dosing',this)"><i class="fa-solid fa-pills"></i> 용량/용법</button>
    ${drug.mix.length?'<button class="tab-btn" onclick="switchTab(\'mix\',this)"><i class="fa-solid fa-syringe"></i> 믹스 방법</button>':''}

  </div>

  ${drug.mix.length?`<div id="tab-mix" class="tab-content">

      <h3><i class="fa-solid fa-syringe" style="color:var(--blue-400);"></i> 믹스 방법 및 투약 속도</h3>

      ${noRenal?`<div class="nbox">${drug.renal[0].dose}</div>`:`<div class="rg">

      <div class="adr-list">${adrRows}</div>
    </div>
  </div>`;
  if(currentWeight) calcDose();
}

function calcIndDose(){
  const wEl=document.getElementById('indWeightInput');
  if(!wEl)return;
  const w=parseFloat(wEl.value);
  currentWeight=wEl.value;
  const cont=document.getElementById('indDoseResults');
  if(!cont||!w||w<=0)return;
  const drugs=window._currentIndDrugs||[];
  const results=[];
  drugs.forEach(drug=>{
    if(!drug||!drug.doses.length)return;
    // find first dose with mg/kg
    const d=drug.doses.find(x=>/([\d.]+)\s*mg\/kg/.test(x.dose));
    if(!d)return;
    const m=d.dose.match(/([\d.]+)\s*mg\/kg/);
    if(!m)return;
    const total=(parseFloat(m[1])*w).toFixed(1);
    results.push({name:drug.name,icon:drug.icon,ibg:drug.ibg,total,unit:'mg',route:d.route,interval:d.interval,max:d.max&&d.max!=='-'?d.max:'',id:drug.id});
  });
  cont.innerHTML=results.slice(0,6).map(r=>`<div class="drc" style="cursor:pointer;" onclick="selectDrug('${r.id}')">
    <div class="dlabel">${r.icon} ${r.name}</div>
    <div class="dval">${r.total} mg</div>
    <div class="dsub">${r.interval} ${r.route}${r.max?' · 최대 '+r.max:''}</div>
  </div>`).join('');
}

function calcDose(){
  const wEl=document.getElementById('weightInput');
  if(!wEl)return;
  const w=parseFloat(wEl.value);
  currentWeight=wEl.value;
  const cont=document.getElementById('doseResults');
  if(!cont)return;
  if(!w||w<=0||!currentDrug){cont.innerHTML='';return;}
  const results=currentDrug.doses.slice(0,4).map(d=>{
    const m=d.dose.match(/([\d.]+)\s*mg\/kg/);
    if(!m)return null;
    const mgPerKg=parseFloat(m[1]);
    const total=(mgPerKg*w).toFixed(1);
    return{ind:d.ind.length>28?d.ind.substring(0,26)+'…':d.ind,total,interval:d.interval,route:d.route,max:d.max&&d.max!=='-'?`최대 ${d.max}`:''};
  }).filter(Boolean);
  cont.innerHTML=results.map(r=>`<div class="drc">
    <div class="dlabel">${r.ind}</div>
    <div class="dval">${r.total} mg</div>
    <div class="dsub">${r.interval} ${r.route} ${r.max}</div>
  </div>`).join('');
}

function switchTab(tabId,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  const t=document.getElementById('tab-'+tabId);
  if(t)t.classList.add('active');
}
